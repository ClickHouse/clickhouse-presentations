name: Build search index

on:
  push:
    branches: [master]
    paths-ignore:
      - 'search-index.js'
      - 'scripts/ocr-cache.json'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: search-index
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SVG rendering and transcription tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends librsvg2-bin tesseract-ocr
          pip install anthropic

      - name: Build search index
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/build-search-index.py

      - name: Commit and push if changed
        run: |
          if [ -z "$(git status --porcelain -- search-index.js scripts/ocr-cache.json)" ]; then
            echo "Search index is up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add search-index.js scripts/ocr-cache.json
          git commit -m "Update search index"
          git pull --rebase origin "${{ github.ref_name }}"
          git push origin "HEAD:${{ github.ref_name }}"
