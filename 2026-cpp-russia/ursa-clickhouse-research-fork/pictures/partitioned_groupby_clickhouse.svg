<svg viewBox="0 0 1200 780" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="shadowStrong" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.18"/>
    </filter>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6B7280"/>
    </marker>
    <linearGradient id="mergeBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FEF2F2"/>
      <stop offset="1" stop-color="#FEE2E2"/>
    </linearGradient>
  </defs>

  <!-- Legend -->
  <g transform="translate(880, 24)">
    <rect x="0" y="0" width="280" height="80" rx="10" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
    <text x="16" y="22" font-size="13" font-weight="700" fill="#111827">Keys (group-by values)</text>
    <rect x="16" y="34" width="22" height="22" rx="4" fill="#6366F1"/><text x="46" y="50" font-size="13" fill="#111827">a</text>
    <rect x="76" y="34" width="22" height="22" rx="4" fill="#F97316"/><text x="106" y="50" font-size="13" fill="#111827">b</text>
    <rect x="136" y="34" width="22" height="22" rx="4" fill="#10B981"/><text x="166" y="50" font-size="13" fill="#111827">c</text>
    <rect x="196" y="34" width="22" height="22" rx="4" fill="#EC4899"/><text x="226" y="50" font-size="13" fill="#111827">d</text>
  </g>

  <!-- Title -->
  <text x="40" y="52" font-size="28" font-weight="700" fill="#111827">ClickHouse — two-stage GROUP BY</text>
  <text x="40" y="82" font-size="16" fill="#6B7280">parallel local aggregation, then parallel merge</text>

  <!-- ===== STAGE 1 ===== -->
  <g transform="translate(40, 120)">
    <circle cx="14" cy="14" r="14" fill="#4F46E5"/>
    <text x="14" y="19" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">1</text>
    <text x="40" y="20" font-size="16" font-weight="700" fill="#1F2937">Local aggregation — each thread keeps its own hash table</text>
  </g>

  <!-- Input blocks row -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, monospace">
    <!-- Block 1 -->
    <g transform="translate(60, 165)" filter="url(#shadow)">
      <rect x="0" y="0" width="200" height="60" rx="8" fill="#fff" stroke="#D1D5DB" stroke-width="1.5"/>
      <rect x="14"  y="14" width="40" height="32" rx="5" fill="#6366F1"/><text x="34"  y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">a</text>
      <rect x="58"  y="14" width="40" height="32" rx="5" fill="#F97316"/><text x="78"  y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">b</text>
      <rect x="102" y="14" width="40" height="32" rx="5" fill="#10B981"/><text x="122" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">c</text>
      <rect x="146" y="14" width="40" height="32" rx="5" fill="#EC4899"/><text x="166" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">d</text>
    </g>
    <!-- Block 2 -->
    <g transform="translate(340, 165)" filter="url(#shadow)">
      <rect x="0" y="0" width="200" height="60" rx="8" fill="#fff" stroke="#D1D5DB" stroke-width="1.5"/>
      <rect x="14"  y="14" width="40" height="32" rx="5" fill="#F97316"/><text x="34"  y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">b</text>
      <rect x="58"  y="14" width="40" height="32" rx="5" fill="#10B981"/><text x="78"  y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">c</text>
      <rect x="102" y="14" width="40" height="32" rx="5" fill="#EC4899"/><text x="122" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">d</text>
      <rect x="146" y="14" width="40" height="32" rx="5" fill="#6366F1"/><text x="166" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">a</text>
    </g>
    <!-- Block 3 -->
    <g transform="translate(620, 165)" filter="url(#shadow)">
      <rect x="0" y="0" width="200" height="60" rx="8" fill="#fff" stroke="#D1D5DB" stroke-width="1.5"/>
      <rect x="14"  y="14" width="40" height="32" rx="5" fill="#10B981"/><text x="34"  y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">c</text>
      <rect x="58"  y="14" width="40" height="32" rx="5" fill="#EC4899"/><text x="78"  y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">d</text>
      <rect x="102" y="14" width="40" height="32" rx="5" fill="#6366F1"/><text x="122" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">a</text>
      <rect x="146" y="14" width="40" height="32" rx="5" fill="#F97316"/><text x="166" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">b</text>
    </g>
    <!-- Block 4 -->
    <g transform="translate(900, 165)" filter="url(#shadow)">
      <rect x="0" y="0" width="200" height="60" rx="8" fill="#fff" stroke="#D1D5DB" stroke-width="1.5"/>
      <rect x="14"  y="14" width="40" height="32" rx="5" fill="#EC4899"/><text x="34"  y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">d</text>
      <rect x="58"  y="14" width="40" height="32" rx="5" fill="#6366F1"/><text x="78"  y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">a</text>
      <rect x="102" y="14" width="40" height="32" rx="5" fill="#F97316"/><text x="122" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">b</text>
      <rect x="146" y="14" width="40" height="32" rx="5" fill="#10B981"/><text x="166" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">c</text>
    </g>
  </g>

  <!-- arrows to thread hash tables -->
  <line x1="160"  y1="232" x2="160"  y2="278" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowGray)"/>
  <line x1="440"  y1="232" x2="440"  y2="278" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowGray)"/>
  <line x1="720"  y1="232" x2="720"  y2="278" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowGray)"/>
  <line x1="1000" y1="232" x2="1000" y2="278" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- Thread hash tables: each contains ALL 4 keys -->
  <g>
    <!-- Thread 1 HT -->
    <g transform="translate(60, 290)" filter="url(#shadow)">
      <rect x="0" y="0" width="200" height="170" rx="10" fill="#fff" stroke="#9CA3AF" stroke-width="1.5"/>
      <text x="100" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#374151">Thread 1 hash table</text>
      <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="16">
        <rect x="32" y="40" width="26" height="26" rx="4" fill="#6366F1"/><text x="45" y="59" text-anchor="middle" font-weight="700" fill="#fff">a</text><text x="74" y="59" fill="#111827">: 1</text>
        <rect x="32" y="70" width="26" height="26" rx="4" fill="#F97316"/><text x="45" y="89" text-anchor="middle" font-weight="700" fill="#fff">b</text><text x="74" y="89" fill="#111827">: 1</text>
        <rect x="32" y="100" width="26" height="26" rx="4" fill="#10B981"/><text x="45" y="119" text-anchor="middle" font-weight="700" fill="#fff">c</text><text x="74" y="119" fill="#111827">: 1</text>
        <rect x="32" y="130" width="26" height="26" rx="4" fill="#EC4899"/><text x="45" y="149" text-anchor="middle" font-weight="700" fill="#fff">d</text><text x="74" y="149" fill="#111827">: 1</text>
      </g>
    </g>
    <!-- Thread 2 HT -->
    <g transform="translate(340, 290)" filter="url(#shadow)">
      <rect x="0" y="0" width="200" height="170" rx="10" fill="#fff" stroke="#9CA3AF" stroke-width="1.5"/>
      <text x="100" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#374151">Thread 2 hash table</text>
      <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="16">
        <rect x="32" y="40" width="26" height="26" rx="4" fill="#6366F1"/><text x="45" y="59" text-anchor="middle" font-weight="700" fill="#fff">a</text><text x="74" y="59" fill="#111827">: 1</text>
        <rect x="32" y="70" width="26" height="26" rx="4" fill="#F97316"/><text x="45" y="89" text-anchor="middle" font-weight="700" fill="#fff">b</text><text x="74" y="89" fill="#111827">: 1</text>
        <rect x="32" y="100" width="26" height="26" rx="4" fill="#10B981"/><text x="45" y="119" text-anchor="middle" font-weight="700" fill="#fff">c</text><text x="74" y="119" fill="#111827">: 1</text>
        <rect x="32" y="130" width="26" height="26" rx="4" fill="#EC4899"/><text x="45" y="149" text-anchor="middle" font-weight="700" fill="#fff">d</text><text x="74" y="149" fill="#111827">: 1</text>
      </g>
    </g>
    <!-- Thread 3 HT -->
    <g transform="translate(620, 290)" filter="url(#shadow)">
      <rect x="0" y="0" width="200" height="170" rx="10" fill="#fff" stroke="#9CA3AF" stroke-width="1.5"/>
      <text x="100" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#374151">Thread 3 hash table</text>
      <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="16">
        <rect x="32" y="40" width="26" height="26" rx="4" fill="#6366F1"/><text x="45" y="59" text-anchor="middle" font-weight="700" fill="#fff">a</text><text x="74" y="59" fill="#111827">: 1</text>
        <rect x="32" y="70" width="26" height="26" rx="4" fill="#F97316"/><text x="45" y="89" text-anchor="middle" font-weight="700" fill="#fff">b</text><text x="74" y="89" fill="#111827">: 1</text>
        <rect x="32" y="100" width="26" height="26" rx="4" fill="#10B981"/><text x="45" y="119" text-anchor="middle" font-weight="700" fill="#fff">c</text><text x="74" y="119" fill="#111827">: 1</text>
        <rect x="32" y="130" width="26" height="26" rx="4" fill="#EC4899"/><text x="45" y="149" text-anchor="middle" font-weight="700" fill="#fff">d</text><text x="74" y="149" fill="#111827">: 1</text>
      </g>
    </g>
    <!-- Thread 4 HT -->
    <g transform="translate(900, 290)" filter="url(#shadow)">
      <rect x="0" y="0" width="200" height="170" rx="10" fill="#fff" stroke="#9CA3AF" stroke-width="1.5"/>
      <text x="100" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#374151">Thread 4 hash table</text>
      <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="16">
        <rect x="32" y="40" width="26" height="26" rx="4" fill="#6366F1"/><text x="45" y="59" text-anchor="middle" font-weight="700" fill="#fff">a</text><text x="74" y="59" fill="#111827">: 1</text>
        <rect x="32" y="70" width="26" height="26" rx="4" fill="#F97316"/><text x="45" y="89" text-anchor="middle" font-weight="700" fill="#fff">b</text><text x="74" y="89" fill="#111827">: 1</text>
        <rect x="32" y="100" width="26" height="26" rx="4" fill="#10B981"/><text x="45" y="119" text-anchor="middle" font-weight="700" fill="#fff">c</text><text x="74" y="119" fill="#111827">: 1</text>
        <rect x="32" y="130" width="26" height="26" rx="4" fill="#EC4899"/><text x="45" y="149" text-anchor="middle" font-weight="700" fill="#fff">d</text><text x="74" y="149" fill="#111827">: 1</text>
      </g>
    </g>
  </g>

  <!-- "same keys in every HT" annotation -->
  <text x="1160" y="488" font-size="13" font-style="italic" fill="#DC2626" text-anchor="end">all 4 keys appear in every thread's hash table</text>

  <!-- converging arrows to merge -->
  <path d="M 160 466 Q 160 510 600 526" stroke="#6B7280" stroke-width="2" fill="none" marker-end="url(#arrowGray)"/>
  <path d="M 440 466 Q 440 510 600 526" stroke="#6B7280" stroke-width="2" fill="none" marker-end="url(#arrowGray)"/>
  <path d="M 720 466 Q 720 510 600 526" stroke="#6B7280" stroke-width="2" fill="none" marker-end="url(#arrowGray)"/>
  <path d="M 1000 466 Q 1000 510 600 526" stroke="#6B7280" stroke-width="2" fill="none" marker-end="url(#arrowGray)"/>

  <!-- ===== STAGE 2 ===== -->
  <g transform="translate(40, 530)">
    <circle cx="14" cy="14" r="14" fill="#DC2626"/>
    <text x="14" y="19" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">2</text>
    <text x="40" y="20" font-size="16" font-weight="700" fill="#1F2937">Merge into the final hash table</text>
  </g>

  <!-- Merge box -->
  <g transform="translate(280, 575)" filter="url(#shadowStrong)">
    <rect x="0" y="0" width="640" height="80" rx="12" fill="url(#mergeBg)" stroke="#F87171" stroke-width="2"/>
    <text x="320" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#991B1B">MERGE</text>
    <text x="320" y="60" text-anchor="middle" font-size="13" fill="#7F1D1D">combine 4 local hash tables into one — bottleneck on high cardinality</text>
  </g>

  <!-- arrow down -->
  <line x1="600" y1="660" x2="600" y2="698" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- Final HT -->
  <g transform="translate(380, 704)" filter="url(#shadow)">
    <rect x="0" y="0" width="440" height="60" rx="10" fill="#fff" stroke="#9CA3AF" stroke-width="1.5"/>
    <text x="20" y="36" font-size="14" font-weight="700" fill="#374151">Final hash table</text>
    <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="15">
      <rect x="150" y="20" width="22" height="22" rx="4" fill="#6366F1"/><text x="161" y="37" text-anchor="middle" font-weight="700" fill="#fff">a</text><text x="188" y="37" fill="#111827">: 4</text>
      <rect x="222" y="20" width="22" height="22" rx="4" fill="#F97316"/><text x="233" y="37" text-anchor="middle" font-weight="700" fill="#fff">b</text><text x="260" y="37" fill="#111827">: 4</text>
      <rect x="294" y="20" width="22" height="22" rx="4" fill="#10B981"/><text x="305" y="37" text-anchor="middle" font-weight="700" fill="#fff">c</text><text x="332" y="37" fill="#111827">: 4</text>
      <rect x="366" y="20" width="22" height="22" rx="4" fill="#EC4899"/><text x="377" y="37" text-anchor="middle" font-weight="700" fill="#fff">d</text><text x="404" y="37" fill="#111827">: 4</text>
    </g>
  </g>
</svg>
