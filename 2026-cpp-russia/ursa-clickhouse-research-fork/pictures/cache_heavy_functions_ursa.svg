<svg viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="shadowStrong" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.18"/>
    </filter>
    <linearGradient id="orangeBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFEDD5"/>
      <stop offset="1" stop-color="#FED7AA"/>
    </linearGradient>
    <linearGradient id="greenBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ECFDF5"/>
      <stop offset="1" stop-color="#D1FAE5"/>
    </linearGradient>
    <linearGradient id="amberBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FEF3C7"/>
      <stop offset="1" stop-color="#FDE68A"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="40" y="48" font-size="26" font-weight="700" fill="#111827">Ursa — cache REGEXP_REPLACE results per block</text>
  <text x="40" y="76" font-size="15" fill="#6B7280">Statistics detect duplicate-heavy columns; the cache pays off after the first miss</text>

  <!-- Query box -->
  <g transform="translate(40, 100)">
    <rect x="0" y="0" width="1120" height="44" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1.5"/>
    <text x="20" y="28" font-size="13" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#1F2937">SELECT REGEXP_REPLACE(Referer, '^https?://(?:www\.)?([^/]+)/.*$', '\1') AS k, … FROM hits …</text>
  </g>

  <!-- Step 1 -->
  <g transform="translate(40, 170)">
    <circle cx="14" cy="14" r="14" fill="#059669"/>
    <text x="14" y="19" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">1</text>
    <text x="40" y="20" font-size="15" font-weight="700" fill="#1F2937">For each row, look up the Referer in a per-block cache — compute only on miss</text>
  </g>

  <!-- Headers -->
  <g font-size="11" font-weight="700" fill="#6B7280">
    <text x="80" y="215" text-anchor="middle">#</text>
    <text x="215" y="215" text-anchor="middle">Referer</text>
    <text x="445" y="215" text-anchor="middle">REGEXP_REPLACE</text>
    <text x="680" y="215" text-anchor="middle">result</text>
    <text x="965" y="215" text-anchor="middle">Block cache (hash table)</text>
  </g>
  <line x1="55" y1="222" x2="775" y2="222" stroke="#E5E7EB" stroke-width="1"/>
  <line x1="800" y1="222" x2="1170" y2="222" stroke="#FCD34D" stroke-width="1.5"/>

  <!-- Row template positions:
       row#: x_center=80
       referer: x=110, w=210
       function: x=335, w=220
       arrow: x=565
       result: x=590, w=170
  -->

  <!-- Row 1: MISS google.com/ -->
  <g transform="translate(0, 232)">
    <text x="80" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#6B7280" font-family="ui-monospace, 'SF Mono', Menlo, monospace">1</text>
    <rect x="110" y="2" width="210" height="28" rx="5" fill="#fff" stroke="#D1D5DB"/>
    <text x="215" y="21" text-anchor="middle" font-size="12" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#111827">https://google.com/</text>
    <rect x="335" y="2" width="220" height="28" rx="5" fill="url(#orangeBg)" stroke="#F97316" stroke-width="1.5"/>
    <text x="445" y="21" text-anchor="middle" font-size="12" font-weight="700" fill="#9A3412" font-family="ui-monospace, 'SF Mono', Menlo, monospace">MISS · compute + store</text>
    <text x="570" y="22" font-size="14" fill="#6B7280">→</text>
    <rect x="590" y="2" width="170" height="28" rx="5" fill="#F9FAFB" stroke="#D1D5DB"/>
    <text x="675" y="21" text-anchor="middle" font-size="12" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#111827">google.com</text>
  </g>

  <!-- Row 2: HIT google.com/ -->
