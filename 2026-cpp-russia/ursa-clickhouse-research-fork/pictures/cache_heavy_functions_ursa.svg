    <rect x="110" y="2" width="210" height="28" rx="5" fill="#fff" stroke="#D1D5DB"/>
    <text x="215" y="21" text-anchor="middle" font-size="12" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#111827">https://google.com/</text>
    <rect x="335" y="2" width="220" height="28" rx="5" fill="url(#greenBg)" stroke="#10B981" stroke-width="1.5"/>
    <text x="445" y="21" text-anchor="middle" font-size="12" font-weight="700" fill="#065F46" font-family="ui-monospace, 'SF Mono', Menlo, monospace">HIT · reuse from cache</text>
    <text x="570" y="22" font-size="14" fill="#6B7280">→</text>
    <rect x="590" y="2" width="170" height="28" rx="5" fill="#F9FAFB" stroke="#D1D5DB"/>
    <text x="675" y="21" text-anchor="middle" font-size="12" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#111827">google.com</text>
