<svg viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="shadowStrong" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.18"/>
    </filter>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6B7280"/>
    </marker>
    <linearGradient id="indigoBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EEF2FF"/>
      <stop offset="1" stop-color="#E0E7FF"/>
    </linearGradient>
    <linearGradient id="greenBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ECFDF5"/>
      <stop offset="1" stop-color="#D1FAE5"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="40" y="48" font-size="26" font-weight="700" fill="#111827">Ursa — ORDER BY late materialization</text>
  <text x="40" y="76" font-size="15" fill="#6B7280">Run filter / sort / LIMIT on the two columns the query needs; fetch the rest only for the 10 survivors</text>

  <!-- Query box -->
  <g transform="translate(40, 100)">
    <rect x="0" y="0" width="1120" height="44" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1.5"/>
    <text x="20" y="28" font-size="14" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#1F2937">SELECT * FROM hits WHERE URL LIKE '%google%' ORDER BY EventTime LIMIT 10</text>
  </g>

  <!-- Step 1: Inner query -->
  <g transform="translate(40, 170)">
    <circle cx="14" cy="14" r="14" fill="#4F46E5"/>
    <text x="14" y="19" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">1</text>
    <text x="40" y="20" font-size="15" font-weight="700" fill="#1F2937">Inner query — read only URL and EventTime</text>
  </g>

  <!-- Narrow tall block: URL + EventTime × 100M -->
  <g transform="translate(520, 200)" filter="url(#shadowStrong)">
    <rect width="160" height="200" rx="12" fill="url(#indigoBg)" stroke="#A5B4FC" stroke-width="2"/>
    <rect x="0" y="0" width="160" height="24" rx="12" fill="#C7D2FE"/>
    <line x1="80" y1="24" x2="80" y2="200" stroke="#A5B4FC" stroke-width="1"/>
    <text x="40" y="17" text-anchor="middle" font-size="10" font-weight="700" fill="#3730A3">URL</text>
    <text x="120" y="17" text-anchor="middle" font-size="10" font-weight="700" fill="#3730A3">EventTime</text>
    <text x="80" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#312E81">100M rows</text>
    <text x="80" y="138" text-anchor="middle" font-size="13" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#312E81">4.19 GB read</text>
    <text x="80" y="174" text-anchor="middle" font-size="11" font-style="italic" fill="#4F46E5">2 columns only</text>
  </g>

  <!-- Arrow down with label -->
  <line x1="600" y1="408" x2="600" y2="460" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="610" y="430" font-size="12" fill="#4F46E5" font-weight="700">filter URL LIKE  +  sort EventTime  +  LIMIT 10</text>

  <!-- 10 tuples block -->
  <g transform="translate(520, 470)" filter="url(#shadow)">
    <rect width="160" height="36" rx="8" fill="url(#greenBg)" stroke="#6EE7B7" stroke-width="2"/>
    <line x1="80" y1="0" x2="80" y2="36" stroke="#A7F3D0" stroke-width="1"/>
    <text x="80" y="23" text-anchor="middle" font-size="12" font-weight="700" fill="#065F46">10 (URL, EventTime) tuples</text>
  </g>

  <!-- Step 2: Outer query -->
  <g transform="translate(40, 528)">
    <circle cx="14" cy="14" r="14" fill="#059669"/>
    <text x="14" y="19" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">2</text>
    <text x="40" y="20" font-size="15" font-weight="700" fill="#1F2937">Outer query — fetch the remaining columns only for those 10 rows</text>
  </g>

  <!-- Arrow down with label -->
  <line x1="600" y1="566" x2="600" y2="618" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="610" y="588" font-size="12" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#059669" font-weight="700">SELECT * FROM hits WHERE (URL, EventTime) IN (…)</text>
  <text x="610" y="606" font-size="11" font-style="italic" fill="#6B7280">10 tuples inlined as constants → fast index lookup</text>

  <!-- Final result block: 10 rows × all cols -->
  <g transform="translate(200, 628)" filter="url(#shadow)">
    <rect width="800" height="36" rx="8" fill="url(#greenBg)" stroke="#6EE7B7" stroke-width="2"/>
    <line x1="80"  y1="0" x2="80"  y2="36" stroke="#A7F3D0" stroke-width="1"/>
    <line x1="160" y1="0" x2="160" y2="36" stroke="#A7F3D0" stroke-width="1"/>
    <line x1="240" y1="0" x2="240" y2="36" stroke="#A7F3D0" stroke-width="1"/>
    <line x1="320" y1="0" x2="320" y2="36" stroke="#A7F3D0" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="36" stroke="#A7F3D0" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="36" stroke="#A7F3D0" stroke-width="1"/>
    <line x1="560" y1="0" x2="560" y2="36" stroke="#A7F3D0" stroke-width="1"/>
    <line x1="640" y1="0" x2="640" y2="36" stroke="#A7F3D0" stroke-width="1"/>
    <line x1="720" y1="0" x2="720" y2="36" stroke="#A7F3D0" stroke-width="1"/>
    <text x="400" y="23" text-anchor="middle" font-size="14" font-weight="700" fill="#065F46">10 rows × all N columns</text>
  </g>

  <!-- Callout -->
  <g transform="translate(40, 686)">
    <rect x="0" y="0" width="1120" height="58" rx="10" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1.5"/>
    <text x="20" y="26" font-size="14" fill="#064E3B"><tspan font-weight="700">Savings:</tspan> 4.19 GB read instead of 21.89 GB; 25.32M rows processed instead of 100M (~4× speedup vs vanilla ClickHouse).</text>
    <text x="20" y="48" font-size="13" font-style="italic" fill="#065F46">Implemented at the query-planner level — the inner subquery is rewritten so that the 10 inner-result tuples become constants in an IN predicate against the index.</text>
  </g>
</svg>
