<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="redBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FEF2F2"/>
      <stop offset="1" stop-color="#FEE2E2"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="40" y="48" font-size="26" font-weight="700" fill="#111827">ClickHouse — REGEXP_REPLACE called once per row</text>
  <text x="40" y="76" font-size="15" fill="#6B7280">Heavy work is repeated for every duplicate value in the block</text>

  <!-- Query box -->
  <g transform="translate(40, 100)">
    <rect x="0" y="0" width="1120" height="44" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1.5"/>
    <text x="20" y="28" font-size="13" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#1F2937">SELECT REGEXP_REPLACE(Referer, '^https?://(?:www\.)?([^/]+)/.*$', '\1') AS k, … FROM hits …</text>
  </g>

  <!-- Step 1 -->
  <g transform="translate(40, 170)">
    <circle cx="14" cy="14" r="14" fill="#DC2626"/>
    <text x="14" y="19" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">1</text>
    <text x="40" y="20" font-size="15" font-weight="700" fill="#1F2937">REGEXP_REPLACE runs for every row — duplicates pay the full cost again</text>
  </g>

  <!-- Headers -->
  <g font-size="11" font-weight="700" fill="#6B7280">
    <text x="200" y="215" text-anchor="middle">#</text>
    <text x="370" y="215" text-anchor="middle">Referer</text>
    <text x="665" y="215" text-anchor="middle">REGEXP_REPLACE</text>
    <text x="940" y="215" text-anchor="middle">result</text>
  </g>
  <line x1="175" y1="222" x2="1025" y2="222" stroke="#E5E7EB" stroke-width="1"/>

